name: Update Scores & Probabilities

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:         # allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run updater
        env:
          SCORE_API_KEY: ${{ secrets.SCORE_API_KEY }}
        run: node scripts/update.js

      - name: Commit changes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/results.json docs/data/probabilities.json
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: update scores + probabilities [skip ci]"
            git push
          fi
