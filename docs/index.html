<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup Sweepstakes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header id="header">
  <div class="header-inner">
    <div class="header-top">
      <div>
        <h1>
          <img class="brand-ball" src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/26bd.svg" alt="" aria-hidden="true" />
          <span>World Cup Sweepstakes</span>
        </h1>
        <p id="tournament-status" class="subtitle">Loading…</p>
      </div>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark/light mode">☀️</button>
    </div>

    <div class="pot-row" id="pot-row">
      <div class="pot-card">
        <span class="pot-label">Total Pot</span>
        <span class="pot-amount" id="pot-total">—</span>
      </div>
      <div class="pot-card">
        <span class="pot-label">🥇 Final Winner</span>
        <span class="pot-amount" id="pot-1st">—</span>
      </div>
      <div class="pot-card">
        <span class="pot-label">🥈 Runner-up</span>
        <span class="pot-amount" id="pot-2nd">—</span>
      </div>
      <div class="pot-card">
        <span class="pot-label">🏅 Group Stage</span>
        <span class="pot-amount" id="pot-grp">—</span>
      </div>
    </div>

    <div class="updated-row">
      <span id="last-updated">—</span>
      <div class="color-key">
        <span class="key-pill key-win">Win</span>
        <span class="key-pill key-draw">Draw</span>
        <span class="key-pill key-loss">Loss</span>
      </div>
    </div>
  </div>
</header>

<div id="live-alert" class="live-alert hidden">⚽ You're missing the footie mate! ⚽</div>

<nav id="nav">
  <button class="nav-btn active" data-view="leaderboard">Leaderboard</button>
  <button class="nav-btn" data-view="matches">Fixtures</button>
</nav>

<div class="views-wrapper">

  <!-- ── LEADERBOARD VIEW ─────────────────────────────────────────── -->
  <section id="view-leaderboard" class="view">
    <h2 class="view-title"><img class="view-title-ball" src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/26bd.svg" alt="" aria-hidden="true" /> Leaderboard</h2>
    <div class="sort-row">
      Sort by:
      <button class="sort-btn" data-sort="p1st">Win Probability</button>
      <button class="sort-btn active" data-sort="grouppts">PTS</button>
    </div>
    <div id="leaderboard-info"></div>
    <div id="leaderboard-list"></div>
  </section>

  <!-- ── MATCHES VIEW ─────────────────────────────────────────────── -->
  <section id="view-matches" class="view hidden">
    <h2 class="view-title"><img class="view-title-ball" src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/26bd.svg" alt="" aria-hidden="true" /> Fixtures</h2>
    <div class="match-tabs">
      <button class="match-tab-btn active" data-mtab="today">Today</button>
      <button class="match-tab-btn" data-mtab="previous">Previous</button>
      <button class="match-tab-btn" data-mtab="future">Future</button>
    </div>
    <div id="matches-list"></div>
  </section>

</div>

<!-- ── PARTICIPANT DETAIL MODAL ───────────────────────────────────── -->
<div id="detail-modal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-backdrop" id="modal-backdrop"></div>
  <div class="modal-sheet">
    <button class="modal-close" id="modal-close">✕</button>
    <div id="detail-content"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
